# MkDocs Configuration Template
# This template shows all available configuration options for GitHub Pages setup

site_name: Your Project Name
site_description: Brief description of your project
site_url: https://username.github.io/repository-name/
repo_url: https://github.com/username/repository-name
repo_name: username/repository-name

# Custom docs directory (uncomment if needed)
# docs_dir: mkdocs_temp

theme:
  name: material
  palette:
    # Light mode
    - scheme: default
      primary: blue
      accent: blue
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    # Dark mode
    - scheme: slate
      primary: blue
      accent: blue
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs          # Top-level navigation tabs
    - navigation.sections       # Collapsible sections
    - navigation.expand         # Expand all sections by default
    - navigation.path           # Show current path
    - navigation.top            # Back to top button
    - search.highlight          # Highlight search terms
    - search.share             # Share search results
    - content.code.copy        # Copy code button
    - content.code.annotate    # Code annotations

plugins:
  - search:
      lang: en
  - mermaid2:
      arguments:
        theme: |
          ^(JSON.parse(__md_get("__palette").index == 1)) ?
          'dark' : 'light'

markdown_extensions:
  # Admonitions (callouts)
  - admonition
  - pymdownx.details
  
  # Code highlighting
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  
  # Content formatting
  - attr_list
  - md_in_html
  - pymdownx.emoji:
      emoji_index: !!python/name:materialx.emoji.twemoji
      emoji_generator: !!python/name:materialx.emoji.to_svg
  
  # Navigation
  - toc:
      permalink: true
      title: On this page

# Navigation structure (auto-generated by generate-navigation.py)
nav:
  - Home: README.md

# Extra CSS/JS (optional)
extra_css:
  - assets/extra.css

extra_javascript:
  - assets/extra.js

# Footer
copyright: Copyright &copy; 2025 Your Name

# Social links (optional)
extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/username
    - icon: fontawesome/brands/twitter
      link: https://twitter.com/username